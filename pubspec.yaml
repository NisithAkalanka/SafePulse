name: safeplus
description: "Student Safety & Support System - SafePulse App."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
    

  cupertino_icons: ^1.0.8
  
  # --- Backend & Auth ---
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  
  # --- Maps & Location ---
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.2
  geocoding: ^4.0.0
  
  # --- Advanced Security Features ---
  shake: ^3.0.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^20.1.0
  flutter_background_service: ^5.1.0
  
  # --- System Utilities ---
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  audioplayers: ^6.5.1
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # --- මෙන්න මෙතන තමයි සිතියමේ රූපය Register වෙලා තියෙන්නේ ---
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/resource_sharing.png
    - assets/images/study_support.png
    - assets/images/safety_transport.png
    - assets/images/tech_support.png
    - assets/images/canteen_runner.png
    - assets/images/campus_logistics.png
    - assets/images/cash_exchange.png
    - assets/images/other.png
    - assets/images/sliit_map.png
    - assets/sounds/iphone_ringtone.mp3
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
firebase_storage: ^11.6.0
